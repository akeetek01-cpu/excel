<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script/change-password.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">


</head>
<body>

<div class="pre-login container">

    <img class="logo" src="images/excel_log.png" alt="logo">

     <h2>Change Password</h2>
    <div class="sub-text">
        Update your password securely
    </div>

    <form id="changePasswordForm">

        <div class="card">
            
             <div class="input-row">
                <img class="lable_icon" src="images/email.png" alt="email">
                <input type="email" id="email" placeholder="Enter email" required>
            </div>
            
            <div class="input-row">
                <img class="lable_icon" src="images/password.png" alt="password">
                <input type="password"  id="oldPassword"
                placeholder="Old Password"
                required>
                <span class="eye" onclick="togglePassword('oldPassword',this)"><img id="password_eye" class="lable_icon" src="images/password_eye_hide.png" alt="password_eye"></span>
            </div>


           


            <div class="input-row">
                <img class="lable_icon" src="images/password.png" alt="password">
                <input type="password" id="newPassword"
                placeholder="New Password" required>
                <span class="eye" onclick="togglePassword('newPassword',this)"><img id="password_eye" class="lable_icon" src="images/password_eye_hide.png" alt="password_eye"></span>
            </div>

             <div class="input-row">
                <img class="lable_icon" src="images/password.png" alt="password">
                <input type="password" id="confirmPassword"
                placeholder="Confirm Password"
                required>
                <span class="eye" onclick="togglePassword('confirmPassword',this)"><img id="password_eye" class="lable_icon" src="images/password_eye_hide.png" alt="password_eye"></span>
            </div>
            
        </div>

         <button id="changePasswordBtn" type="button" class="button btn">
            <span class="button__text">Change Password</span>
        </button>

        <div class="error" id="errorMsg">
            Passwords do not match.
        </div>

        <div class="success" id="successMsg">
            Password changed successfully.
        </div>

    </form>

    <a href="login.html" class="back-link">
        Back to Login
    </a>

</div>

<script>
function togglePassword(id, icon){
    const input = document.getElementById(id);

    if(input.type === "password"){
        input.type = "text";
        icon.querySelector('img').src = "images/password_eye_show.png";
    }else{
        input.type = "password";
        icon.querySelector('img').src = "images/password_eye_hide.png";
    }
}

document.getElementById("changePasswordForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const newPass =
        document.getElementById("newPassword").value;

    const confirmPass =
        document.getElementById("confirmPassword").value;

    const error =
        document.getElementById("errorMsg");

    const success =
        document.getElementById("successMsg");

    error.style.display = "none";
    success.style.display = "none";

    if(newPass !== confirmPass){
        error.style.display = "block";
        return;
    }

    success.style.display = "block";
});
</script>

</body>
</html>
